openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Earnity Web3 Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: users
    description: User management
  - name: quests
    description: Quest management
  - name: raffles
    description: Raffle management
  - name: auctions
    description: Auction management
  - name: staking
    description: Staking pool management
  - name: activity
    description: Activity and analytics
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /users:
    post:
      operationId: upsertUser
      tags: [users]
      summary: Create or update user by wallet address
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertUserRequest"
      responses:
        "200":
          description: User upserted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{walletAddress}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get user profile by wallet address
      parameters:
        - in: path
          name: walletAddress
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: Not found

  /users/{walletAddress}/stats:
    get:
      operationId: getUserStats
      tags: [users]
      summary: Get user statistics and summary
      parameters:
        - in: path
          name: walletAddress
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserStats"

  /quests:
    get:
      operationId: getQuests
      tags: [quests]
      summary: List all quests
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [active, completed, expired]
        - in: query
          name: projectId
          schema:
            type: integer
      responses:
        "200":
          description: List of quests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Quest"
    post:
      operationId: createQuest
      tags: [quests]
      summary: Create a new quest
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateQuestRequest"
      responses:
        "201":
          description: Quest created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quest"

  /quests/{id}:
    get:
      operationId: getQuest
      tags: [quests]
      summary: Get a quest by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Quest
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quest"
        "404":
          description: Not found

  /quests/{id}/complete:
    post:
      operationId: completeQuest
      tags: [quests]
      summary: Mark quest as completed by a user
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                walletAddress:
                  type: string
              required: [walletAddress]
      responses:
        "200":
          description: Quest completion recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuestCompletion"

  /raffles:
    get:
      operationId: getRaffles
      tags: [raffles]
      summary: List all raffles
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [active, ended, cancelled]
      responses:
        "200":
          description: List of raffles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Raffle"
    post:
      operationId: createRaffle
      tags: [raffles]
      summary: Create a new raffle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRaffleRequest"
      responses:
        "201":
          description: Raffle created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Raffle"

  /raffles/{id}:
    get:
      operationId: getRaffle
      tags: [raffles]
      summary: Get a raffle by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Raffle
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Raffle"

  /raffles/{id}/enter:
    post:
      operationId: enterRaffle
      tags: [raffles]
      summary: Enter a raffle
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                walletAddress:
                  type: string
                ticketCount:
                  type: integer
                  default: 1
              required: [walletAddress]
      responses:
        "200":
          description: Raffle entry recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RaffleEntry"

  /auctions:
    get:
      operationId: getAuctions
      tags: [auctions]
      summary: List all auctions
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [active, ended, cancelled]
      responses:
        "200":
          description: List of auctions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Auction"
    post:
      operationId: createAuction
      tags: [auctions]
      summary: Create a new auction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAuctionRequest"
      responses:
        "201":
          description: Auction created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Auction"

  /auctions/{id}:
    get:
      operationId: getAuction
      tags: [auctions]
      summary: Get an auction by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Auction
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Auction"

  /auctions/{id}/bid:
    post:
      operationId: placeBid
      tags: [auctions]
      summary: Place a bid on an auction
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                walletAddress:
                  type: string
                amount:
                  type: number
              required: [walletAddress, amount]
      responses:
        "200":
          description: Bid placed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bid"

  /auctions/{id}/bids:
    get:
      operationId: getAuctionBids
      tags: [auctions]
      summary: Get bids for an auction
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Bid list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Bid"

  /staking/pools:
    get:
      operationId: getStakingPools
      tags: [staking]
      summary: List all staking pools
      responses:
        "200":
          description: Staking pools
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StakingPool"
    post:
      operationId: createStakingPool
      tags: [staking]
      summary: Create a staking pool
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStakingPoolRequest"
      responses:
        "201":
          description: Pool created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StakingPool"

  /staking/pools/{id}:
    get:
      operationId: getStakingPool
      tags: [staking]
      summary: Get a staking pool by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Staking pool
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StakingPool"

  /staking/stake:
    post:
      operationId: stakeTokens
      tags: [staking]
      summary: Stake tokens in a pool
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                walletAddress:
                  type: string
                poolId:
                  type: integer
                amount:
                  type: number
              required: [walletAddress, poolId, amount]
      responses:
        "200":
          description: Stake recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StakePosition"

  /staking/positions/{walletAddress}:
    get:
      operationId: getStakePositions
      tags: [staking]
      summary: Get all stake positions for a user
      parameters:
        - in: path
          name: walletAddress
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Stake positions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StakePosition"

  /activity:
    get:
      operationId: getActivity
      tags: [activity]
      summary: Get platform-wide recent activity feed
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Activity feed
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  /activity/{walletAddress}:
    get:
      operationId: getUserActivity
      tags: [activity]
      summary: Get activity for a specific user
      parameters:
        - in: path
          name: walletAddress
          required: true
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: User activity
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  /stats/platform:
    get:
      operationId: getPlatformStats
      tags: [activity]
      summary: Get overall platform statistics
      responses:
        "200":
          description: Platform stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformStats"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    User:
      type: object
      properties:
        id:
          type: integer
        walletAddress:
          type: string
        username:
          type: string
          nullable: true
        avatarUrl:
          type: string
          nullable: true
        points:
          type: integer
        totalRewardsEarned:
          type: number
        questsCompleted:
          type: integer
        rafflesEntered:
          type: integer
        auctionsParticipated:
          type: integer
        createdAt:
          type: string
          format: date-time
      required: [id, walletAddress, points, totalRewardsEarned, questsCompleted, rafflesEntered, auctionsParticipated, createdAt]

    UpsertUserRequest:
      type: object
      properties:
        walletAddress:
          type: string
        username:
          type: string
          nullable: true
        avatarUrl:
          type: string
          nullable: true
      required: [walletAddress]

    UserStats:
      type: object
      properties:
        walletAddress:
          type: string
        points:
          type: integer
        totalRewardsEarned:
          type: number
        questsCompleted:
          type: integer
        rafflesEntered:
          type: integer
        rafflesWon:
          type: integer
        auctionsWon:
          type: integer
        totalStaked:
          type: number
        rank:
          type: integer
          nullable: true
      required: [walletAddress, points, totalRewardsEarned, questsCompleted, rafflesEntered, rafflesWon, auctionsWon, totalStaked]

    Quest:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        rewardPoints:
          type: integer
        rewardTokens:
          type: number
        requirements:
          type: string
          nullable: true
        imageUrl:
          type: string
          nullable: true
        status:
          type: string
          enum: [active, completed, expired]
        projectName:
          type: string
          nullable: true
        totalCompletions:
          type: integer
        maxCompletions:
          type: integer
          nullable: true
        expiresAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, title, description, rewardPoints, rewardTokens, status, totalCompletions, createdAt]

    CreateQuestRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        rewardPoints:
          type: integer
        rewardTokens:
          type: number
        requirements:
          type: string
          nullable: true
        projectName:
          type: string
          nullable: true
        maxCompletions:
          type: integer
          nullable: true
        expiresAt:
          type: string
          format: date-time
          nullable: true
        createdByWallet:
          type: string
      required: [title, description, rewardPoints, rewardTokens, createdByWallet]

    QuestCompletion:
      type: object
      properties:
        id:
          type: integer
        questId:
          type: integer
        walletAddress:
          type: string
        pointsEarned:
          type: integer
        tokensEarned:
          type: number
        completedAt:
          type: string
          format: date-time
      required: [id, questId, walletAddress, pointsEarned, tokensEarned, completedAt]

    Raffle:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        rewardDescription:
          type: string
        imageUrl:
          type: string
          nullable: true
        entryCostPoints:
          type: integer
        maxEntries:
          type: integer
          nullable: true
        totalEntries:
          type: integer
        status:
          type: string
          enum: [active, ended, cancelled]
        winnerWallet:
          type: string
          nullable: true
        projectName:
          type: string
          nullable: true
        endsAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, title, description, rewardDescription, entryCostPoints, totalEntries, status, createdAt]

    CreateRaffleRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        rewardDescription:
          type: string
        entryCostPoints:
          type: integer
        maxEntries:
          type: integer
          nullable: true
        projectName:
          type: string
          nullable: true
        endsAt:
          type: string
          format: date-time
          nullable: true
        createdByWallet:
          type: string
      required: [title, description, rewardDescription, entryCostPoints, createdByWallet]

    RaffleEntry:
      type: object
      properties:
        id:
          type: integer
        raffleId:
          type: integer
        walletAddress:
          type: string
        ticketCount:
          type: integer
        enteredAt:
          type: string
          format: date-time
      required: [id, raffleId, walletAddress, ticketCount, enteredAt]

    Auction:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        assetName:
          type: string
        assetType:
          type: string
          enum: [nft, token, physical]
        imageUrl:
          type: string
          nullable: true
        startingPrice:
          type: number
        currentBid:
          type: number
        currentBidderWallet:
          type: string
          nullable: true
        totalBids:
          type: integer
        status:
          type: string
          enum: [active, ended, cancelled]
        projectName:
          type: string
          nullable: true
        endsAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, title, description, assetName, assetType, startingPrice, currentBid, totalBids, status, createdAt]

    CreateAuctionRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        assetName:
          type: string
        assetType:
          type: string
          enum: [nft, token, physical]
        startingPrice:
          type: number
        projectName:
          type: string
          nullable: true
        endsAt:
          type: string
          format: date-time
          nullable: true
        createdByWallet:
          type: string
      required: [title, description, assetName, assetType, startingPrice, createdByWallet]

    Bid:
      type: object
      properties:
        id:
          type: integer
        auctionId:
          type: integer
        walletAddress:
          type: string
        amount:
          type: number
        placedAt:
          type: string
          format: date-time
      required: [id, auctionId, walletAddress, amount, placedAt]

    StakingPool:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        tokenSymbol:
          type: string
        apr:
          type: number
        minStake:
          type: number
        maxStake:
          type: number
          nullable: true
        totalStaked:
          type: number
        totalStakers:
          type: integer
        durationDays:
          type: integer
          nullable: true
        status:
          type: string
          enum: [active, paused, ended]
        projectName:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, name, description, tokenSymbol, apr, minStake, totalStaked, totalStakers, status, createdAt]

    CreateStakingPoolRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        tokenSymbol:
          type: string
        apr:
          type: number
        minStake:
          type: number
        maxStake:
          type: number
          nullable: true
        durationDays:
          type: integer
          nullable: true
        projectName:
          type: string
          nullable: true
        createdByWallet:
          type: string
      required: [name, description, tokenSymbol, apr, minStake, createdByWallet]

    StakePosition:
      type: object
      properties:
        id:
          type: integer
        poolId:
          type: integer
        walletAddress:
          type: string
        amount:
          type: number
        rewardsEarned:
          type: number
        stakedAt:
          type: string
          format: date-time
        pool:
          $ref: "#/components/schemas/StakingPool"
      required: [id, poolId, walletAddress, amount, rewardsEarned, stakedAt]

    ActivityItem:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [quest_completed, raffle_entered, raffle_won, bid_placed, auction_won, staked, unstaked]
        walletAddress:
          type: string
        description:
          type: string
        points:
          type: integer
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, type, walletAddress, description, createdAt]

    PlatformStats:
      type: object
      properties:
        totalUsers:
          type: integer
        totalQuests:
          type: integer
        totalQuestCompletions:
          type: integer
        totalRaffles:
          type: integer
        totalAuctions:
          type: integer
        totalStakingPools:
          type: integer
        totalValueStaked:
          type: number
        totalPointsDistributed:
          type: integer
      required: [totalUsers, totalQuests, totalQuestCompletions, totalRaffles, totalAuctions, totalStakingPools, totalValueStaked, totalPointsDistributed]
